<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>출장 경로 최적화 · Tmap</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#07080f; --card:#0d1020; --card2:#131825; --border:#1c2238;
    --accent:#4f8ef7; --accent2:#7aaeff;
    --tmap:#e8372e; --tmap2:#ff6b63;
    --gold:#f5a623; --gold2:#ffc14d;
    --green:#0ec97a; --text:#dde4f0;
    --muted:#4d5a73; --muted2:#8a9ab8;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background:radial-gradient(ellipse 80% 40% at 20% 0%,rgba(79,142,247,.06) 0%,transparent 60%),
               radial-gradient(ellipse 60% 50% at 80% 100%,rgba(232,55,46,.05) 0%,transparent 60%)}
  .page{max-width:1240px;margin:0 auto;padding:28px 20px;position:relative;z-index:1}

  header{text-align:center;margin-bottom:22px}
  .logo-row{display:inline-flex;align-items:center;gap:10px;background:rgba(232,55,46,.08);
    border:1px solid rgba(232,55,46,.25);border-radius:99px;padding:5px 16px 5px 10px;margin-bottom:14px}
  .tmap-badge{background:var(--tmap);color:white;font-size:10px;font-weight:900;
    padding:3px 8px;border-radius:99px;letter-spacing:.05em;font-family:'JetBrains Mono',monospace}
  .live-dot{width:6px;height:6px;border-radius:50%;background:var(--tmap2);animation:blink 1.6s ease infinite}
  .logo-text{font-size:11px;color:var(--muted2);font-family:'JetBrains Mono',monospace;letter-spacing:.06em}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
  h1{font-size:32px;font-weight:900;letter-spacing:-.035em;
    background:linear-gradient(130deg,#fff 20%,var(--accent2) 60%,var(--tmap2) 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
  .subtitle{color:var(--muted2);font-size:13px;font-weight:300}

  /* 엔진 배지 */
  .engine-badge{display:inline-flex;align-items:center;gap:6px;background:var(--card);
    border:1px solid var(--border);border-radius:99px;padding:4px 12px;margin-top:8px;font-size:11px;color:var(--muted2)}
  .engine-dot{width:6px;height:6px;border-radius:50%}
  .engine-dot.tmap{background:var(--tmap2)}
  .engine-dot.osrm{background:var(--gold)}

  .grid{display:grid;grid-template-columns:400px 1fr;gap:18px;align-items:start}
  @media(max-width:860px){.grid{grid-template-columns:1fr}h1{font-size:24px}}

  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden}
  .card+.card{margin-top:14px}
  .ch{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px}
  .ch-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
  .ci-blue{background:rgba(79,142,247,.14)} .ci-gold{background:rgba(245,166,35,.14)}
  .ch-title{font-size:13px;font-weight:700}
  .cb{padding:16px 18px}

  .fl{display:block;font-size:10px;font-weight:700;color:var(--muted2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
  .fi{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:9px;
    color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;
    padding:10px 13px;outline:none;transition:border-color .2s,box-shadow .2s}
  .fi:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,142,247,.1)}
  .ft{resize:vertical;min-height:165px;line-height:1.9}
  .hint{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.5}
  .fg{margin-bottom:13px}
  .lr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .lr .fl{margin-bottom:0}
  .sbtn{font-size:11px;color:var(--accent2);background:none;border:none;cursor:pointer;
    font-family:'Noto Sans KR',sans-serif;text-decoration:underline;text-decoration-style:dashed;text-underline-offset:3px}

  .tabs{display:flex;gap:7px;margin-bottom:13px}
  .tab{flex:1;padding:9px;border-radius:8px;border:1px solid var(--border);background:var(--bg);
    color:var(--muted2);font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:700;
    cursor:pointer;transition:all .2s;text-align:center}
  .tab.on{border-color:var(--accent);background:rgba(79,142,247,.1);color:var(--accent2)}

  .btn{width:100%;padding:13px;border:none;border-radius:10px;font-family:'Noto Sans KR',sans-serif;
    font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;
    display:flex;align-items:center;justify-content:center;gap:8px}
  .btn-go{background:linear-gradient(135deg,var(--tmap),#c0251d);color:white;box-shadow:0 4px 20px rgba(232,55,46,.35)}
  .btn-go:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 28px rgba(232,55,46,.45)}
  .btn-go:disabled{opacity:.45;cursor:not-allowed;transform:none}
  .btn-reset{background:var(--card2);border:1px solid var(--border);color:var(--muted2);margin-top:8px;font-size:12px;padding:9px}
  .btn-reset:hover{border-color:var(--accent);color:var(--accent2)}

  #prog{display:none;margin-top:13px}
  .pb-wrap{background:var(--bg);border-radius:99px;height:4px;margin-bottom:6px;border:1px solid var(--border);overflow:hidden}
  .pb-fill{height:100%;background:linear-gradient(90deg,var(--tmap),var(--accent));border-radius:99px;transition:width .35s ease;width:0%}
  .pt{font-size:11px;color:var(--muted2);font-family:'JetBrains Mono',monospace}

  .err{background:rgba(232,55,46,.08);border:1px solid rgba(232,55,46,.3);border-radius:9px;
    padding:11px 13px;font-size:12px;color:#ff9b96;margin-top:10px;display:none;line-height:1.7}

  #res{display:none}
  .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:13px}
  .stat{background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:10px;text-align:center}
  .sv{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:var(--gold2);display:block}
  .sl{font-size:10px;color:var(--muted);margin-top:2px}

  /* 경로 엔진 표시 */
  .res-header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
  .engine-tag{font-size:10px;padding:3px 9px;border-radius:99px;font-family:'JetBrains Mono',monospace;font-weight:700}
  .engine-tag.tmap{background:rgba(232,55,46,.15);color:var(--tmap2);border:1px solid rgba(232,55,46,.3)}
  .engine-tag.osrm{background:rgba(245,166,35,.12);color:var(--gold2);border:1px solid rgba(245,166,35,.3)}

  .rlist{display:flex;flex-direction:column;gap:4px}
  .ri{display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--border);
    border-radius:9px;padding:10px 12px;transition:border-color .2s;animation:fs .3s ease both}
  @keyframes fs{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
  .ri:hover{border-color:rgba(79,142,247,.3)}
  .rn{width:25px;height:25px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;flex-shrink:0;color:white}
  .rn-s{background:var(--green)} .rn-m{background:var(--accent)} .rn-e{background:var(--gold);color:#111}
  .rinfo{flex:1;min-width:0}
  .rname{font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .raddr{font-size:10px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rtime{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted2);text-align:right;flex-shrink:0}
  .leg{display:flex;align-items:center;gap:9px;padding:0 12px;font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace}
  .legline{width:2px;height:13px;background:linear-gradient(to bottom,var(--tmap),rgba(232,55,46,.15));margin-left:11px;border-radius:1px;flex-shrink:0}

  #map{height:600px;border-radius:16px;overflow:hidden;border:1px solid var(--border)}
  .mp{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted);font-size:13px;text-align:center;line-height:1.7;background:var(--card)}
  .mp .bi{font-size:44px;opacity:.25}

  ::-webkit-scrollbar{width:5px} ::-webkit-scrollbar-track{background:var(--bg)} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>
<div class="page">
  <header>
    <div class="logo-row">
      <div class="tmap-badge">TMAP</div>
      <div class="live-dot"></div>
      <div class="logo-text">ROUTE OPTIMIZER v5.0</div>
    </div>
    <h1>🗺️ 출장 경로 최적화</h1>
    <p class="subtitle">Tmap JSONP 지오코딩 · Tmap 경유지 순서 최적화 API · 최대 10곳</p>
    <div class="engine-badge">
      <div class="engine-dot tmap"></div> Tmap 우선
      <span style="margin:0 6px;opacity:.3">|</span>
      <div class="engine-dot osrm"></div> OSRM 폴백
    </div>
  </header>

  <div class="grid">
    <div>
      <div class="card">
        <div class="ch">
          <div class="ch-icon ci-blue">📍</div>
          <span class="ch-title">출발지 및 방문지 입력</span>
        </div>
        <div class="cb">
          <div class="fg">
            <label class="fl">출발지</label>
            <input class="fi" type="text" id="start" placeholder="예: 충청남도 아산시 배방읍 휴대세교길 248번길 31">
          </div>

            <textarea class="fi ft" id="dests" placeholder="예:
충청남도 천안시 서북구 불당26로 79
충청남도 아산시 온천대로 1459
충청남도 천안시 동남구 신부동 429
충청남도 아산시 둔포면 아산밸리로 46"></textarea>

              <button class="tab on" id="t-one" onclick="setMode('one')">⏱ 최소 이동시간</button>

      <div id="res">

          <div class="cb">
            <div class="res-header-row">
              <div class="stat-grid" id="stats" style="flex:1;margin:0"></div>
              <div id="engine-tag-wrap" style="margin-left:10px;flex-shrink:0"></div>

    <div>

          <div>주소 입력 후 계산하면<br>최적 경로가 지도에 표시됩니다</div>
        </div>

<script>
// ── 설정 ──────────────────────────────────────────────────────────────────────
const APPKEY = 'djiIRQpCIm7AMOuUoRqzf6MCLqEXje70aMC9naHa';
let leafMap = null, roundTrip = false;

// ── 유틸 ──────────────────────────────────────────────────────────────────────
function setMode(m) {
  roundTrip = m === 'rtn';
  document.getElementById('t-one').classList.toggle('on', m === 'one');
  document.getElementById('t-rtn').classList.toggle('on', m === 'rtn');
}
function loadSample() {
  document.getElementById('start').value = '충청남도 아산시 배방읍 휴대세교길 248번길 31';
  document.getElementById('dests').value =
`충청남도 천안시 서북구 불당26로 79
충청남도 아산시 온천대로 1459
충청남도 천안시 동남구 신부동 429
충청남도 아산시 둔포면 아산밸리로 46`;
}
function sp(pct, txt) {
  document.getElementById('pb').style.width = pct + '%';
  document.getElementById('pt').textContent = txt;
}
function showErr(msg) {
  const e = document.getElementById('err');
  e.innerHTML = '⚠️ ' + msg;
  e.style.display = 'block';
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function fmtTime(sec) {
  if (!sec || isNaN(sec)) return '--';
  const m = Math.round(sec / 60);
  return m < 60 ? m + '분' : Math.floor(m/60) + '시간 ' + (m%60) + '분';
}
function fmtDist(m) {
  if (!m || isNaN(m)) return '--';
  return m >= 1000 ? (m/1000).toFixed(1) + 'km' : Math.round(m) + 'm';
}
function nowStr() {
  // YYYYMMDDHHmm (12자리) — routeOptimization10 startTime 형식
  const d = new Date();
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}${pad(d.getHours())}${pad(d.getMinutes())}`;
}

// ── JSONP 헬퍼 (GET 전용) ─────────────────────────────────────────────────────
let _cbSeq = 0;
function jsonp(url, timeout = 8000) {
  return new Promise((resolve, reject) => {
    const cbName = '__tcb_' + (++_cbSeq) + '_' + Date.now();
    const timer = setTimeout(() => { cleanup(); reject(new Error('JSONP timeout')); }, timeout);
    window[cbName] = d => { cleanup(); resolve(d); };
    function cleanup() {
      clearTimeout(timer);
      delete window[cbName];
      const el = document.getElementById(cbName);
      if (el) el.remove();
    }
    const script = document.createElement('script');
    script.id = cbName;
    const sep = url.includes('?') ? '&' : '?';
    script.src = url + sep + 'callback=' + cbName;
    script.onerror = () => { cleanup(); reject(new Error('script error')); };
    document.head.appendChild(script);
  });
}

// ── Tmap JSONP 지오코딩 ───────────────────────────────────────────────────────
async function geocodeTmap(address) {
  // 1) Full Text Geocoding (도로명/지번)
  try {
    const url = `https://apis.openapi.sk.com/tmap/geo/fullAddrGeo?version=1`
      + `&fullAddr=${encodeURIComponent(address)}`
      + `&coordType=WGS84GEO&addressFlag=F01&count=1&appKey=${APPKEY}`;
    const data = await jsonp(url);
    const c = data?.coordinateInfo?.coordinate?.[0];
    if (c) {
      const lon = parseFloat(c.lon || c.newLon || 0);
      const lat = parseFloat(c.lat || c.newLat || 0);
      if (lon && lat) return { lat, lon, display: address };
    }
  } catch(e) { console.warn('fullAddrGeo 실패:', e.message); }

  // 2) POI 키워드 검색
  try {
    const url = `https://apis.openapi.sk.com/tmap/pois?version=1`
      + `&searchKeyword=${encodeURIComponent(address)}`
      + `&resCoordType=WGS84GEO&count=1&searchtypCd=A&appKey=${APPKEY}`;
    const data = await jsonp(url);
    const poi = data?.searchPoiInfo?.pois?.poi?.[0];
    if (poi?.noorLon && poi?.noorLat) {
      return {
        lat: parseFloat(poi.noorLat), lon: parseFloat(poi.noorLon),
        display: [poi.upperAddrName, poi.middleAddrName, poi.roadName].filter(Boolean).join(' ')
      };
    }
  } catch(e) { console.warn('POI검색 실패:', e.message); }

  // 3) 주소 단순화 후 재시도
  const simplified = address.replace(/\s+\d+호?\s*$/, '').replace(/(\d+번길)\s+\d+$/, '$1');
  if (simplified !== address && simplified.length > 4) {
    try {
      const url = `https://apis.openapi.sk.com/tmap/geo/fullAddrGeo?version=1`
        + `&fullAddr=${encodeURIComponent(simplified)}`
        + `&coordType=WGS84GEO&addressFlag=F01&count=1&appKey=${APPKEY}`;
      const data = await jsonp(url);
      const c = data?.coordinateInfo?.coordinate?.[0];
      if (c) {
        const lon = parseFloat(c.lon || c.newLon || 0);
        const lat = parseFloat(c.lat || c.newLat || 0);
        if (lon && lat) return { lat, lon, display: simplified, approx: true };
      }
    } catch(e) {}
  }
  return null;
}

// ── Tmap routeOptimization10 (fetch POST) ────────────────────────────────────
// 공식 문서 기준 응답 파싱:
//   totalTime/totalDistance → data.properties (FeatureCollection 최상위)
//   경유지 순서 → pointType "B1","B2"... 순서대로
//   출발 → pointType "S" / 도착 → pointType "E"
async function tmapOptimize(startGeo, viaGeos) {
  // 출발지 = 도착지 (roundTrip) or 마지막 방문지 = 도착지
  const endGeo = roundTrip ? startGeo : viaGeos[viaGeos.length - 1];
  const vias = roundTrip ? viaGeos : viaGeos.slice(0, -1);

  const body = {
    reqCoordType: 'WGS84GEO',
    resCoordType: 'WGS84GEO',
    startName: '출발',
    startX: String(startGeo.lon),
    startY: String(startGeo.lat),
    startTime: nowStr(),
    endName: roundTrip ? '출발지 복귀' : '도착',
    endX: String(endGeo.lon),
    endY: String(endGeo.lat),
    endPoiId: '',
    searchOption: '0',
    carType: '0',
    viaPoints: vias.map((g, i) => ({
      viaPointId: String(i + 1),
      viaPointName: g.original || ('경유' + (i+1)),
      viaDetailAddress: '',
      viaX: String(g.lon),
      viaY: String(g.lat),
      viaPoiId: '',
      viaTime: 0,
      wishStartTime: '',
      wishEndTime: ''
    }))
  };

  const res = await fetch(
    'https://apis.openapi.sk.com/tmap/routes/routeOptimization10?version=1',
    {
      method: 'POST',
      headers: {
        'appKey': APPKEY,
        'Content-Type': 'application/json',
        'Accept': 'application/json'
      },
      body: JSON.stringify(body)
    }
  );
  if (!res.ok) throw new Error(`Tmap API 오류 ${res.status}`);
  return await res.json();
}

// routeOptimization10 응답 파싱
// 반환: { orderedCoords, totalTime, totalDistance, legTimes, legDists, polylines }
function parseTmapOptResult(data, startGeo, viaGeos) {
  // 총 시간/거리 → FeatureCollection 최상위 properties
  const totalTime = parseInt(data.properties?.totalTime || 0);
  const totalDist = parseInt(data.properties?.totalDistance || 0);

  const features = data.features || [];

  // Point features: S=출발, B1/B2... = 경유지(최적순서), E=도착
  const pointFeats = features.filter(f => f.geometry?.type === 'Point');

  // 폴리라인 수집 (LineString features)
  const polylines = [];
  features.filter(f => f.geometry?.type === 'LineString').forEach(f => {
    const coords = f.geometry.coordinates.map(([lon, lat]) => [lat, lon]);
    if (coords.length) polylines.push(...coords);
  });

  // 경유지 순서 파싱: B1 < B2 < B3...
  const viaPoints = pointFeats
    .filter(f => /^B\d+$/.test(f.properties?.pointType || ''))
    .sort((a, b) => {
      const na = parseInt(a.properties.pointType.slice(1));
      const nb = parseInt(b.properties.pointType.slice(1));
      return na - nb;
    });

  // 각 viaPoint의 viaPointId로 원본 geoCoord 매핑
  // viaPointId는 body에서 "1","2"... 로 설정했으므로 index = id-1
  const orderedCoords = [startGeo];
  const legTimes = [];
  const legDists = [];

  viaPoints.forEach(f => {
    const id = parseInt(f.properties?.viaPointId || '0');
    const origIdx = id - 1; // roundTrip: vias = viaGeos[0..n-2], 아니면 vias = viaGeos[0..n-2]
    // vias 배열 기준으로 가져옴
    const vias = roundTrip ? viaGeos : viaGeos.slice(0, -1);
    const geo = vias[origIdx] || viaGeos[origIdx];
    if (geo) orderedCoords.push(geo);
    legTimes.push(parseInt(f.properties?.time || 0));
    legDists.push(parseInt(f.properties?.distance || 0));
  });

  // 도착지 추가
  const endFeat = pointFeats.find(f => f.properties?.pointType === 'E');
  if (endFeat) {
    const endGeo = roundTrip ? startGeo : viaGeos[viaGeos.length - 1];
    orderedCoords.push(endGeo);
    legTimes.push(parseInt(endFeat.properties?.time || 0));
    legDists.push(parseInt(endFeat.properties?.distance || 0));
  }

  return { orderedCoords, totalTime, totalDist, legTimes, legDists, polylines };
}

// ── OSRM 폴백 (CORS 허용) ────────────────────────────────────────────────────
async function getDurationMatrix(coords) {
  const s = coords.map(c => `${c.lon},${c.lat}`).join(';');
  const r = await fetch(`https://router.project-osrm.org/table/v1/driving/${s}?annotations=duration,distance`);
  if (!r.ok) throw new Error('OSRM 서버 오류');
  const d = await r.json();
  if (d.code !== 'Ok') throw new Error('OSRM 오류: ' + d.message);
  return { durations: d.durations, distances: d.distances };
}
async function getOSRMPath(coords) {
  try {
    const s = coords.map(c => `${c.lon},${c.lat}`).join(';');
    const r = await fetch(`https://router.project-osrm.org/route/v1/driving/${s}?overview=full&geometries=geojson`);
    const d = await r.json();
    if (d.code !== 'Ok') return [];
    return d.routes[0].geometry.coordinates.map(([lon, lat]) => [lat, lon]);
  } catch(e) { return []; }
}
function routeCost(route, matrix) {
  let c = 0;
  for (let i = 0; i < route.length-1; i++) c += matrix[route[i]][route[i+1]];
  if (roundTrip) c += matrix[route[route.length-1]][0];
  return c;
}
function nearestNeighbor(matrix) {
  const n = matrix.length, vis = new Set([0]), route = [0];
  while (vis.size < n) {
    const last = route[route.length-1];
    let best = -1, bestD = Infinity;
    for (let i = 0; i < n; i++) if (!vis.has(i) && matrix[last][i] < bestD) { bestD = matrix[last][i]; best = i; }
    vis.add(best); route.push(best);
  }
  return route;
}
function twoOpt(route, matrix) {
  let best = [...route], improved = true;
  while (improved) {
    improved = false;
    for (let i = 1; i < best.length-1; i++) {
      for (let j = i+1; j < best.length; j++) {
        const nr = [...best.slice(0,i), ...best.slice(i,j+1).reverse(), ...best.slice(j+1)];
        if (nr[0] !== 0) continue;
        if (routeCost(nr, matrix) < routeCost(best, matrix)) { best = nr; improved = true; }
      }
    }
  }
  return best;
}

// ── 메인 실행 ─────────────────────────────────────────────────────────────────
async function run() {
  const startAddr = document.getElementById('start').value.trim();
  const rawDests  = document.getElementById('dests').value.split('\n').map(s=>s.trim()).filter(Boolean);

  if (!startAddr)         { showErr('출발지를 입력해주세요.'); return; }
  if (!rawDests.length)   { showErr('방문지를 1개 이상 입력해주세요.'); return; }
  if (rawDests.length>10) { showErr('방문지는 최대 10개까지 가능합니다.'); return; }

  document.getElementById('go-btn').disabled = true;
  document.getElementById('prog').style.display = 'block';
  document.getElementById('res').style.display = 'none';
  document.getElementById('err').style.display = 'none';
  sp(4, '준비 중…');

  try {
    // 1) 지오코딩
    sp(7, '출발지 검색 중…');
    const startGeo = await geocodeTmap(startAddr);
    if (!startGeo) throw new Error(`출발지를 찾을 수 없습니다: <b>"${startAddr}"</b>`);
    startGeo.original = startAddr;

    const viaGeos = [];
    for (let i = 0; i < rawDests.length; i++) {
      sp(9 + ((i+1)/rawDests.length)*36, `방문지 검색 중… (${i+1}/${rawDests.length})`);
      const g = await geocodeTmap(rawDests[i]);
      if (!g) throw new Error(`주소를 찾을 수 없습니다: <b>"${rawDests[i]}"</b>`);
      g.original = rawDests[i];
      viaGeos.push(g);
      await sleep(80);
    }

    // 2) Tmap routeOptimization10 시도
    sp(52, 'Tmap 경유지 최적화 API 호출 중…');
    let usedEngine = 'tmap';
    let orderedCoords, totalTime, totalDist, legTimes, legDists, polylines;

    try {
      const tmapResult = await tmapOptimize(startGeo, viaGeos);
      console.log('Tmap 최적화 응답:', tmapResult);
      const parsed = parseTmapOptResult(tmapResult, startGeo, viaGeos);
      orderedCoords = parsed.orderedCoords;
      totalTime     = parsed.totalTime;
      totalDist     = parsed.totalDist;
      legTimes      = parsed.legTimes;
      legDists      = parsed.legDists;
      polylines     = parsed.polylines;

      if (!orderedCoords || orderedCoords.length < 2) throw new Error('Tmap 응답 파싱 실패');

    } catch(tmapErr) {
      console.warn('Tmap 최적화 실패, OSRM 폴백:', tmapErr.message);
      sp(58, 'OSRM 폴백으로 전환 중…');
      usedEngine = 'osrm';

      const allCoords = [startGeo, ...viaGeos];
      const { durations, distances } = await getDurationMatrix(allCoords);

      sp(72, 'TSP 최적화 계산 중…');
      await sleep(80);
      const route = twoOpt(nearestNeighbor(durations), durations);
      orderedCoords = route.map(i => allCoords[i]);
      if (roundTrip) orderedCoords.push(allCoords[0]);

      legTimes = [];
      legDists = [];
      for (let i = 0; i < route.length-1; i++) {
        legTimes.push(durations[route[i]][route[i+1]]);
        legDists.push(distances ? distances[route[i]][route[i+1]] : 0);
      }
      if (roundTrip) {
        legTimes.push(durations[route[route.length-1]][0]);
        legDists.push(distances ? distances[route[route.length-1]][0] : 0);
      }
      totalTime = legTimes.reduce((a,b)=>a+b,0);
      totalDist = legDists.reduce((a,b)=>a+b,0);
      polylines = await getOSRMPath(orderedCoords);
    }

    sp(93, '결과 표시 중…');
    renderResults(orderedCoords, totalTime, totalDist, legTimes, legDists, usedEngine);
    renderMap(orderedCoords, polylines);

    sp(100, '완료!');
    setTimeout(() => { document.getElementById('prog').style.display = 'none'; }, 900);

  } catch(err) {
    console.error(err);
    showErr(err.message || String(err));
    document.getElementById('prog').style.display = 'none';
  } finally {
    document.getElementById('go-btn').disabled = false;
  }
}

// ── 결과 렌더링 ───────────────────────────────────────────────────────────────
function renderResults(orderedCoords, totalTime, totalDist, legTimes, legDists, engine) {
  const stops = orderedCoords.length - 2; // 출발·도착 제외
  const avg = legTimes.length ? legTimes.reduce((a,b)=>a+b,0)/legTimes.length : 0;

  document.getElementById('stats').innerHTML = `
    <div class="stat"><span class="sv">${fmtTime(totalTime)}</span><div class="sl">총 이동 시간</div></div>
    <div class="stat"><span class="sv">${fmtDist(totalDist)}</span><div class="sl">총 거리</div></div>
    <div class="stat"><span class="sv">${stops}</span><div class="sl">방문지 수</div></div>`;

  document.getElementById('engine-tag-wrap').innerHTML =
    `<div class="engine-tag ${engine}">${engine === 'tmap' ? '🗺 Tmap 최적화' : '⚡ OSRM TSP'}</div>`;

  const list = document.getElementById('rlist');
  list.innerHTML = '';

  orderedCoords.forEach((p, step) => {
    const isStart = step === 0;
    const isEnd   = step === orderedCoords.length - 1;
    const cls     = isStart ? 'rn-s' : (isEnd ? 'rn-e' : 'rn-m');
    const label   = isStart ? 'S' : (isEnd ? 'E' : String(step));
    const legTime = legTimes[step - 1];
    const legDist = legDists[step - 1];

    const item = document.createElement('div');
    item.className = 'ri';
    item.style.animationDelay = (step * 45) + 'ms';
    item.innerHTML = `
      <div class="rn ${cls}">${label}</div>
      <div class="rinfo">
        <div class="rname">${p.original || p.display || '알 수 없음'}</div>
        <div class="raddr">${p.display || ''}${p.approx ? ' <span style="color:var(--gold);font-size:9px">·근사위치</span>' : ''}</div>
      </div>
      <div class="rtime">
        ${legTime != null ? fmtTime(legTime) : '출발'}
        <br><span style="color:var(--muted);font-size:9px">${legDist ? fmtDist(legDist) : ''}</span>
      </div>`;
    list.appendChild(item);

    if (step < orderedCoords.length - 1) {
      const t = legTimes[step], d = legDists[step];
      const leg = document.createElement('div');
      leg.className = 'leg';
      leg.innerHTML = `<div class="legline"></div><div style="flex:1"></div>
        <span>↓ ${t ? fmtTime(t) : '--'} ${d ? '/ ' + fmtDist(d) : ''}</span>`;
      list.appendChild(leg);
    }
  });

  document.getElementById('res').style.display = 'block';
}

// ── 지도 렌더링 ───────────────────────────────────────────────────────────────
function renderMap(orderedCoords, polylines) {
  document.getElementById('map').innerHTML = '';
  if (leafMap) { try { leafMap.remove(); } catch(e){} leafMap = null; }

  leafMap = L.map('map');
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO', maxZoom: 19
  }).addTo(leafMap);

  if (polylines?.length > 1) {
    L.polyline(polylines, { color:'#e8372e', weight:4, opacity:.85 }).addTo(leafMap);
  }

  const bounds = [];
  orderedCoords.forEach((p, step) => {
    const isStart = step === 0;
    const isEnd   = step === orderedCoords.length - 1;
    const color   = isStart ? '#0ec97a' : (isEnd ? '#f5a623' : '#4f8ef7');
    const label   = isStart ? 'S' : (isEnd ? 'E' : String(step));
    const icon = L.divIcon({
      className: '',
      html: `<div style="width:28px;height:28px;border-radius:50%;background:${color};
        display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;
        color:${isEnd?'#111':'white'};font-family:'Noto Sans KR',sans-serif;
        box-shadow:0 3px 12px rgba(0,0,0,.55);border:2px solid rgba(255,255,255,.2)">${label}</div>`,
      iconSize: [28,28], iconAnchor: [14,14]
    });
    L.marker([p.lat, p.lon], { icon }).addTo(leafMap)
      .bindPopup(`<b style="font-family:sans-serif">${p.original || p.display || ''}</b>`);
    bounds.push([p.lat, p.lon]);
  });

  if (bounds.length) leafMap.fitBounds(bounds, { padding:[50,50] });
}

// ── 초기화 ────────────────────────────────────────────────────────────────────
function resetAll() {
  document.getElementById('start').value = '';
  document.getElementById('dests').value = '';
  document.getElementById('res').style.display = 'none';
  document.getElementById('prog').style.display = 'none';
  document.getElementById('err').style.display = 'none';
  if (leafMap) { try { leafMap.remove(); } catch(e){} leafMap = null; }
  document.getElementById('map').innerHTML = `
    <div class="mp"><div class="bi">🗺️</div>
    <div>주소 입력 후 계산하면<br>최적 경로가 지도에 표시됩니다</div></div>`;
}
