<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>출장 경로 최적화</title>
<script src="https://apis.openapi.sk.com/tmap/jsv2?version=1&appKey=" id="tmapScript"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #080c14;
  --panel:   #0c1220;
  --card:    #111827;
  --border:  #1e2d45;
  --border2: #243347;
  --accent:  #e8372e;
  --accentH: #ff4f46;
  --blue:    #3b82f6;
  --green:   #10b981;
  --gold:    #f59e0b;
  --text:    #e2e8f0;
  --muted:   #64748b;
  --muted2:  #94a3b8;
}

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
}

/* ── 사이드 패널 ── */
.panel {
  width: 360px;
  min-width: 360px;
  height: 100vh;
  background: var(--panel);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.panel-head {
  padding: 20px 20px 0;
  flex-shrink: 0;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 18px;
}
.brand-chip {
  background: var(--accent);
  color: #fff;
  font-size: 10px;
  font-weight: 900;
  letter-spacing: .1em;
  padding: 4px 9px;
  border-radius: 5px;
}
.brand-title { font-size: 13px; font-weight: 700; letter-spacing: -.02em; }
.brand-sub   { font-size: 10px; color: var(--muted); margin-top: 2px; }

.panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 0 20px 20px;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}
.panel-body::-webkit-scrollbar { width: 4px; }
.panel-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* 폼 */
.field { margin-bottom: 13px; }
.lbl {
  display: block;
  font-size: 10px;
  font-weight: 700;
  color: var(--muted2);
  letter-spacing: .1em;
  text-transform: uppercase;
  margin-bottom: 5px;
}
.lbl-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 5px;
}
.lbl-row .lbl { margin: 0; }
.sample-btn {
  font-size: 10px; color: var(--blue);
  background: none; border: none; cursor: pointer;
  font-family: inherit; padding: 0;
  text-decoration: underline dashed;
  text-underline-offset: 3px;
}
.sample-btn:hover { color: #60a5fa; }

input, textarea {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px;
  padding: 10px 12px;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
  resize: none;
}
input:focus, textarea:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(59,130,246,.1);
}
input::placeholder, textarea::placeholder { color: var(--muted); }
textarea { height: 120px; line-height: 1.85; }

.toggle-row { display: flex; gap: 6px; margin-bottom: 13px; }
.toggle {
  flex: 1; padding: 8px;
  border-radius: 7px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted2);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 11px; font-weight: 600;
  cursor: pointer; transition: all .18s; text-align: center;
}
.toggle.on {
  background: rgba(59,130,246,.1);
  border-color: var(--blue);
  color: #93c5fd;
}

.run-btn {
  width: 100%; padding: 13px; border: none; border-radius: 9px;
  background: var(--accent); color: #fff;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px; font-weight: 700;
  cursor: pointer; transition: all .2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  box-shadow: 0 4px 18px rgba(232,55,46,.28);
}
.run-btn:hover:not(:disabled) {
  background: var(--accentH);
  transform: translateY(-1px);
  box-shadow: 0 6px 24px rgba(232,55,46,.38);
}
.run-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

.prog-wrap { margin-top: 13px; display: none; }
.prog-track {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 99px; height: 3px; overflow: hidden; margin-bottom: 6px;
}
.prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--blue));
  border-radius: 99px; width: 0%; transition: width .4s ease;
}
.prog-txt { font-size: 11px; color: var(--muted2); font-family: 'Courier New', monospace; }

.err-box {
  margin-top: 11px;
  background: rgba(232,55,46,.07);
  border: 1px solid rgba(232,55,46,.22);
  border-radius: 8px; padding: 10px 12px;
  font-size: 12px; color: #fca5a5;
  display: none; line-height: 1.6;
}

hr.div { border: none; border-top: 1px solid var(--border); margin: 16px 0; display: none; }

/* 결과 */
.result-sec { display: none; }
.stats-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-bottom: 13px;
}
.stat-box {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; padding: 11px 12px;
}
.stat-v {
  font-size: 16px; font-weight: 700; color: var(--gold);
  font-family: 'Courier New', monospace; display: block; margin-bottom: 2px;
}
.stat-l { font-size: 10px; color: var(--muted); }

.stop-list { display: flex; flex-direction: column; gap: 3px; }
.stop-item {
  display: flex; align-items: center; gap: 10px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; padding: 9px 11px;
  animation: fadeUp .22s ease both;
  transition: border-color .15s;
}
.stop-item:hover { border-color: var(--border2); }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(5px); }
  to   { opacity: 1; transform: translateY(0); }
}
.stop-num {
  width: 24px; height: 24px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; flex-shrink: 0;
  font-family: 'Courier New', monospace;
}
.n-s { background: var(--green);  color: #fff; }
.n-w { background: var(--blue);   color: #fff; }
.n-e { background: var(--gold);   color: #111; }
.stop-info { flex: 1; min-width: 0; }
.stop-name { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.stop-meta { font-size: 10px; color: var(--muted); margin-top: 1px; }
.leg-row {
  display: flex; align-items: center; gap: 6px;
  padding: 2px 11px 2px 30px;
  font-size: 10px; color: var(--muted);
  font-family: 'Courier New', monospace;
}
.leg-dot { width: 1px; height: 10px; background: var(--border2); }

/* 지도 */
#map { flex: 1; height: 100vh; }

@media (max-width: 700px) {
  body { flex-direction: column; overflow: auto; }
  .panel { width: 100%; min-width: 0; height: auto; }
  #map { height: 55vh; flex: none; }
}
</style>
</head>
<body>

<div class="panel">
  <div class="panel-head">
    <div class="brand">
      <div class="brand-chip">TMAP</div>
      <div>
        <div class="brand-title">출장 경로 최적화</div>
        <div class="brand-sub">경유지 순서 자동 계산 · 실도로 기준</div>
      </div>
    </div>
  </div>

  <div class="panel-body">

    <div class="field">
      <label class="lbl">TMAP App Key</label>
      <input id="appkey" type="password" placeholder="발급받은 App Key 입력">
    </div>

    <div class="field">
      <label class="lbl">출발지</label>
      <input id="start" placeholder="예: 충청남도 아산시 배방읍 희망로 46">
    </div>

    <div class="field">
      <div class="lbl-row">
        <span class="lbl">방문지 (한 줄에 하나 · 최대 10개)</span>
        <button class="sample-btn" onclick="loadSample()">예시</button>
      </div>
      <textarea id="dests" placeholder="충청남도 천안시 서북구 불당26로 79
충청남도 아산시 온천대로 1459
충청남도 천안시 동남구 신부동 429"></textarea>
    </div>

    <div class="field">
      <label class="lbl">최적화 방식</label>
      <div class="toggle-row">
        <button class="toggle on" id="t-one" onclick="setMode('one')">⏱ 최소 이동시간</button>
        <button class="toggle"    id="t-rtn" onclick="setMode('rtn')">🔄 출발지 복귀</button>
      </div>
    </div>

    <button class="run-btn" id="runBtn" onclick="run()">
      <span>🚗</span> 최적 경로 계산
    </button>

    <div class="prog-wrap" id="progWrap">
      <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
      <div class="prog-txt"  id="progTxt">준비 중…</div>
    </div>
    <div class="err-box" id="errBox"></div>

    <hr class="div" id="divider">

    <div class="result-sec" id="resultSec">
      <div class="stats-row" id="statsRow"></div>
      <div class="stop-list" id="stopList"></div>
    </div>

  </div>
</div>

<div id="map"></div>

<script>
let map, markers = [], polylines = [], roundTrip = false;

// ── 지도 초기화 ───────────────────────────────────────────────────────────────
function initMap() {
  if (typeof Tmapv2 === 'undefined') { setTimeout(initMap, 200); return; }
  map = new Tmapv2.Map('map', {
    center: new Tmapv2.LatLng(36.5, 127.5),
    width: '100%', height: '100%', zoom: 7
  });
}

function clearMap() {
  markers.forEach(m => m.setMap(null));
  polylines.forEach(p => p.setMap(null));
  markers = []; polylines = [];
}

function addMarker(lat, lon, label, type) {
  const bg = type === 'S' ? '#10b981' : type === 'E' ? '#f59e0b' : '#3b82f6';
  const tc = type === 'E' ? '#111' : '#fff';
  const icon = new Tmapv2.Icon({
    content: `<div style="width:30px;height:30px;border-radius:50%;background:${bg};
      display:flex;align-items:center;justify-content:center;
      font-size:11px;font-weight:700;color:${tc};font-family:sans-serif;
      box-shadow:0 2px 10px rgba(0,0,0,.5);border:2px solid rgba(255,255,255,.25)">${label}</div>`,
    size: new Tmapv2.Size(30, 30),
    anchor: new Tmapv2.Point(15, 15)
  });
  markers.push(new Tmapv2.Marker({ position: new Tmapv2.LatLng(lat, lon), icon, map }));
}

function drawLine(coords) {
  if (coords.length < 2) return;
  polylines.push(new Tmapv2.Polyline({
    path: coords.map(c => new Tmapv2.LatLng(c[1], c[0])),
    strokeColor: '#e8372e', strokeWeight: 4, strokeOpacity: .85, map
  }));
}

// ── 유틸 ──────────────────────────────────────────────────────────────────────
function setMode(m) {
  roundTrip = m === 'rtn';
  document.getElementById('t-one').classList.toggle('on', m === 'one');
  document.getElementById('t-rtn').classList.toggle('on', m === 'rtn');
}
function loadSample() {
  document.getElementById('appkey').value = 'djiIRQpCIm7AMOuUoRqzf6MCLqEXje70aMC9naHa';
  document.getElementById('start').value  = '충청남도 아산시 배방읍 휴대세교길 248번길 31';
  document.getElementById('dests').value  =
`충청남도 천안시 서북구 불당26로 79
충청남도 아산시 온천대로 1459
충청남도 천안시 동남구 신부동 429
충청남도 아산시 둔포면 아산밸리로 46`;
}
const sp = (p, t) => {
  document.getElementById('progFill').style.width = p + '%';
  document.getElementById('progTxt').textContent = t;
};
function showErr(msg) {
  const e = document.getElementById('errBox');
  e.innerHTML = '⚠️ ' + msg; e.style.display = 'block';
}
function fmt(sec) {
  if (!sec && sec !== 0) return '--';
  const m = Math.round(Number(sec) / 60);
  return m < 60 ? m + '분' : Math.floor(m/60) + 'h ' + (m%60) + 'm';
}
function fmtD(m) {
  if (!m) return '--';
  const v = Number(m);
  return v >= 1000 ? (v/1000).toFixed(1) + 'km' : Math.round(v) + 'm';
}
function nowStr() {
  const d = new Date(), p = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}${p(d.getHours())}${p(d.getMinutes())}`;
}

// ── 지오코딩 ──────────────────────────────────────────────────────────────────
async function geocode(addr, key) {
  // 1) 주소 검색
  const r = await fetch(
    `https://apis.openapi.sk.com/tmap/geo/fullAddrGeo?version=1&fullAddr=${encodeURIComponent(addr)}&coordType=WGS84GEO&addressFlag=F01&count=1`,
    { headers: { appKey: key, Accept: 'application/json' } }
  );
  const d = await r.json();
  const c = d?.coordinateInfo?.coordinate?.[0];
  if (c) {
    const lat = parseFloat(c.newLat || c.lat);
    const lon = parseFloat(c.newLon || c.lon);
    if (lat && lon) return { lat, lon };
  }
  // 2) POI 키워드 폴백
  const r2 = await fetch(
    `https://apis.openapi.sk.com/tmap/pois?version=1&searchKeyword=${encodeURIComponent(addr)}&resCoordType=WGS84GEO&count=1&searchtypCd=A`,
    { headers: { appKey: key, Accept: 'application/json' } }
  );
  const d2 = await r2.json();
  const poi = d2?.searchPoiInfo?.pois?.poi?.[0];
  if (poi?.noorLat && poi?.noorLon) return { lat: parseFloat(poi.noorLat), lon: parseFloat(poi.noorLon) };
  throw new Error(`주소를 찾을 수 없습니다: <b>"${addr}"</b>`);
}

// ── 경유지 최적화 ─────────────────────────────────────────────────────────────
async function optimize(startGeo, destGeos, key) {
  const endGeo  = roundTrip ? startGeo : destGeos[destGeos.length - 1];
  const viaList = roundTrip ? destGeos  : destGeos.slice(0, -1);

  const body = {
    reqCoordType: 'WGS84GEO', resCoordType: 'WGS84GEO',
    startX: String(startGeo.lon), startY: String(startGeo.lat),
    startName: '출발', startTime: nowStr(),
    endX: String(endGeo.lon), endY: String(endGeo.lat),
    endName: roundTrip ? '복귀' : '도착', endPoiId: '',
    searchOption: '0', carType: '0',
    viaPoints: viaList.map((p, i) => ({
      viaPointId: String(i+1), viaPointName: p.name || ('P'+(i+1)),
      viaDetailAddress: '', viaX: String(p.lon), viaY: String(p.lat),
      viaPoiId: '', viaTime: 0, wishStartTime: '', wishEndTime: ''
    }))
  };

  const res = await fetch('https://apis.openapi.sk.com/tmap/routes/routeOptimization10?version=1', {
    method: 'POST',
    headers: { appKey: key, 'Content-Type': 'application/json', Accept: 'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error(`최적화 API 오류 (HTTP ${res.status})`);
  return await res.json();
}

// ── 메인 ──────────────────────────────────────────────────────────────────────
async function run() {
  const key       = document.getElementById('appkey').value.trim();
  const startAddr = document.getElementById('start').value.trim();
  const lines     = document.getElementById('dests').value.split('\n').map(s=>s.trim()).filter(Boolean);

  if (!key)             return showErr('App Key를 입력해주세요.');
  if (!startAddr)       return showErr('출발지를 입력해주세요.');
  if (!lines.length)    return showErr('방문지를 1개 이상 입력해주세요.');
  if (lines.length > 10) return showErr('방문지는 최대 10개까지 가능합니다.');

  document.getElementById('tmapScript').src =
    `https://apis.openapi.sk.com/tmap/jsv2?version=1&appKey=${key}`;

  document.getElementById('runBtn').disabled = true;
  document.getElementById('progWrap').style.display = 'block';
  document.getElementById('errBox').style.display = 'none';
  document.getElementById('resultSec').style.display = 'none';
  document.getElementById('divider').style.display = 'none';
  clearMap();

  try {
    sp(6, '출발지 검색 중…');
    const startGeo = await geocode(startAddr, key);
    startGeo.name = startAddr;

    const destGeos = [];
    for (let i = 0; i < lines.length; i++) {
      sp(8 + ((i+1)/lines.length)*38, `방문지 검색 중… (${i+1}/${lines.length})`);
      const g = await geocode(lines[i], key);
      g.name = lines[i];
      destGeos.push(g);
      await new Promise(r => setTimeout(r, 60));
    }

    sp(52, 'Tmap 경유지 최적화 중…');
    const result   = await optimize(startGeo, destGeos, key);
    const features = result.features || [];

    sp(84, '지도에 경로 표시 중…');

    // 폴리라인
    const allCoords = [];
    features.forEach(f => {
      if (f.geometry?.type === 'LineString') allCoords.push(...f.geometry.coordinates);
    });
    drawLine(allCoords);

    // Point features 파싱
    const vias = roundTrip ? destGeos : destGeos.slice(0, -1);
    const pts  = features.filter(f => f.geometry?.type === 'Point');
    const stops = [];

    pts.forEach(f => {
      const pt  = f.properties?.pointType || '';
      const lon = f.geometry.coordinates[0];
      const lat = f.geometry.coordinates[1];
      const pr  = f.properties;

      if (pt === 'S') {
        addMarker(lat, lon, 'S', 'S');
        stops.push({ order: 0, type: 'S', name: startAddr, time: null, dist: null });
      } else if (pt === 'E') {
        addMarker(lat, lon, 'E', 'E');
        stops.push({ order: 9999, type: 'E', name: roundTrip ? '출발지 복귀' : lines[lines.length-1], time: pr?.time, dist: pr?.distance });
      } else if (/^B\d+$/.test(pt)) {
        const idx = parseInt(pt.slice(1));
        const vid = parseInt(pr?.viaPointId || '0');
        const nm  = vias[vid-1]?.name || pr?.viaPointName || '';
        addMarker(lat, lon, String(idx), 'W');
        stops.push({ order: idx, type: 'W', name: nm, time: pr?.time, dist: pr?.distance });
      }
    });

    stops.sort((a, b) => a.order - b.order);

    // 통계
    document.getElementById('statsRow').innerHTML = `
      <div class="stat-box">
        <span class="stat-v">${fmt(result.properties?.totalTime)}</span>
        <span class="stat-l">총 이동시간</span>
      </div>
      <div class="stat-box">
        <span class="stat-v">${fmtD(result.properties?.totalDistance)}</span>
        <span class="stat-l">총 거리</span>
      </div>`;

    // 정류장 목록
    const listEl = document.getElementById('stopList');
    listEl.innerHTML = '';
    stops.forEach((s, i) => {
      const nc = s.type==='S' ? 'n-s' : s.type==='E' ? 'n-e' : 'n-w';
      const nl = s.type==='S' ? 'S'   : s.type==='E' ? 'E'   : String(s.order);

      const item = document.createElement('div');
      item.className = 'stop-item';
      item.style.animationDelay = (i * 40) + 'ms';
      item.innerHTML = `
        <div class="stop-num ${nc}">${nl}</div>
        <div class="stop-info">
          <div class="stop-name">${s.name}</div>
          ${s.time || s.dist ? `<div class="stop-meta">이전 구간 · ${fmt(s.time)} · ${fmtD(s.dist)}</div>` : '<div class="stop-meta">출발지</div>'}
        </div>`;
      listEl.appendChild(item);

      if (i < stops.length - 1) {
        const nxt = stops[i+1];
        const leg = document.createElement('div');
        leg.className = 'leg-row';
        leg.innerHTML = `<div class="leg-dot"></div>↓ ${fmt(nxt?.time)} / ${fmtD(nxt?.dist)}`;
        listEl.appendChild(leg);
      }
    });

    document.getElementById('divider').style.display = 'block';
    document.getElementById('resultSec').style.display = 'block';
    map.setCenter(new Tmapv2.LatLng(startGeo.lat, startGeo.lon));
    map.setZoom(10);

    sp(100, '완료!');
    setTimeout(() => { document.getElementById('progWrap').style.display = 'none'; }, 800);

  } catch(err) {
    console.error(err);
    showErr(err.message || String(err));
    document.getElementById('progWrap').style.display = 'none';
  } finally {
    document.getElementById('runBtn').disabled = false;
  }
}

initMap();
</script>
</body>
</html>
