
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMAP 출장 경로 최적화</title>
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white}
.wrapper{display:grid;grid-template-columns:360px 1fr;height:100vh}
.panel{padding:20px;background:#020617;overflow:auto}
input,textarea{width:100%;padding:10px;margin:8px 0;background:#111827;border:1px solid #334155;color:white;border-radius:6px}
button{width:100%;padding:12px;background:#e11d48;border:none;border-radius:6px;font-weight:bold;color:white;cursor:pointer}
#map{width:100%;height:100%}
</style>
</head>

<body>

<div class="wrapper">

<div class="panel">

<h2>출장 경로 최적화</h2>

<label>TMAP APPKEY</label>
<input id="appkey" placeholder="TMAP APPKEY 입력">

<label>출발지</label>
<input id="start" placeholder="예: 충남 당진시">

<label>방문지 (한 줄 하나)</label>
<textarea id="dests" rows="6"></textarea>

<button onclick="run()">최적 경로 계산</button>

<div id="result"></div>

</div>

<div id="map"></div>

</div>

<script>

let map
let markers=[]
let polylines=[]

async function loadSDK(key){

return new Promise((resolve,reject)=>{

if(window.Tmapv2){
resolve()
return
}

const script=document.createElement("script")
script.src=`https://apis.openapi.sk.com/tmap/jsv2?version=1&appKey=${key}`

script.onload=()=>{

let wait=setInterval(()=>{

if(window.Tmapv2){
clearInterval(wait)
resolve()
}

},100)

}

script.onerror=()=>reject("TMAP SDK 로드 실패")

document.head.appendChild(script)

})

}

function initMap(){

map=new Tmapv2.Map("map",{
center:new Tmapv2.LatLng(36.35,127.38),
width:"100%",
height:"100%",
zoom:7
})

}

function clearMap(){

markers.forEach(m=>m.setMap(null))
polylines.forEach(p=>p.setMap(null))

markers=[]
polylines=[]

}

function addMarker(lat,lon,label){

const marker=new Tmapv2.Marker({
position:new Tmapv2.LatLng(lat,lon),
label:label,
map:map
})

markers.push(marker)

}

function drawLine(coords){

const path=coords.map(c=>new Tmapv2.LatLng(c[1],c[0]))

const poly=new Tmapv2.Polyline({
path:path,
strokeColor:"#ff0000",
strokeWeight:5,
map:map
})

polylines.push(poly)

}

async function geocode(addr,key){

const url=`https://apis.openapi.sk.com/tmap/geo/fullAddrGeo?version=1&fullAddr=${encodeURIComponent(addr)}&coordType=WGS84GEO&addressFlag=F01`

const res=await fetch(url,{headers:{appKey:key}})
const data=await res.json()

const c=data.coordinateInfo.coordinate[0]

return{
lat:parseFloat(c.newLat||c.lat),
lon:parseFloat(c.newLon||c.lon)
}

}

async function optimize(start,points,key){

const body={
reqCoordType:"WGS84GEO",
resCoordType:"WGS84GEO",
startX:String(start.lon),
startY:String(start.lat),
startName:"출발",
startTime:"202601010900",
endX:String(points[points.length-1].lon),
endY:String(points[points.length-1].lat),
endName:"도착",
searchOption:"0",
viaPoints:points.slice(0,-1).map((p,i)=>({
viaPointId:String(i+1),
viaPointName:"P"+(i+1),
viaX:String(p.lon),
viaY:String(p.lat)
}))
}

const res=await fetch("https://apis.openapi.sk.com/tmap/routes/routeOptimization10?version=1",{
method:"POST",
headers:{
appKey:key,
"Content-Type":"application/json"
},
body:JSON.stringify(body)
})

return await res.json()

}

async function run(){

const key=document.getElementById("appkey").value.trim()
const startAddr=document.getElementById("start").value.trim()
const destLines=document.getElementById("dests").value.split("\n").filter(x=>x.trim())

if(!key) return alert("APPKEY 입력")

await loadSDK(key)

if(!map) initMap()

clearMap()

const start=await geocode(startAddr,key)

const dests=[]

for(let d of destLines){

const g=await geocode(d,key)
dests.push(g)

}

const result=await optimize(start,dests,key)

const features=result.features

const coords=[]

features.forEach(f=>{

if(f.geometry.type==="LineString"){
coords.push(...f.geometry.coordinates)
}

if(f.geometry.type==="Point"){

const lon=f.geometry.coordinates[0]
const lat=f.geometry.coordinates[1]

addMarker(lat,lon,f.properties.pointType)

}

})

drawLine(coords)

map.setCenter(new Tmapv2.LatLng(start.lat,start.lon))

document.getElementById("result").innerHTML=
"총 거리: "+(result.properties.totalDistance/1000).toFixed(1)+"km<br>"+
"총 시간: "+Math.round(result.properties.totalTime/60)+"분"

}

</script>

</body>
</html>
